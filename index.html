<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory-byggare</title>
<style>
body{font-family:sans-serif;background:#f5f5f5;text-align:center;padding:20px;max-width:900px;margin:auto;}
.section{background:white;padding:12px;margin:10px auto;border-radius:12px;}
input[type="text"]{width:90%;padding:8px;margin:6px;border-radius:8px;border:1px solid #ddd;font-size:15px;}
.card-editor{border:1px solid #eee;border-radius:10px;padding:10px;margin:8px 0;text-align:left;}
img.thumb{max-height:80px;margin-top:6px;border-radius:8px;display:block;}
.smallBtn{background:#eee;padding:6px 10px;border-radius:6px;cursor:pointer;margin:3px;border:none;font-size:14px;}
.tts-row{display:flex;align-items:center;gap:8px;margin:6px 0;flex-wrap:wrap;}
.tts-row input[type="text"]{flex:1;width:auto;margin:0;}
.play-tts{background:#1976D2;color:white;padding:6px 12px;border-radius:6px;cursor:pointer;border:none;font-size:14px;white-space:nowrap;}
.lang-row{display:flex;gap:10px;flex-wrap:wrap;margin:8px 0;}
.lang-col{flex:1;min-width:200px;background:#f9f9f9;border-radius:8px;padding:8px;}
.lang-col h4{margin:0 0 6px 0;font-size:14px;color:#333;}
.tool-row{display:flex;justify-content:center;gap:25px;margin-top:15px;flex-wrap:wrap;}
.tool-btn{display:flex;flex-direction:column;align-items:center;cursor:pointer;}
.tool-btn .icon{width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #333;font-size:26px;background:white;}
.tool-btn .label{margin-top:6px;font-size:13px;}
button,.smallBtn,.play-tts{transition:all 0.1s ease;}
button:active,.smallBtn:active,.play-tts:active{transform:scale(0.95);}
.tool-btn:active .icon{transform:scale(0.92);background:#eee;}
#preview{display:none;text-align:left;}
.preview-grid{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;justify-content:center;}
.preview-card{width:110px;height:110px;background:#ddd;border-radius:10px;border:2px solid #999;display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:13px;color:#555;text-align:center;padding:4px;box-sizing:border-box;}
.preview-card img{width:100%;height:100%;object-fit:cover;border-radius:8px;}

/* QR modal */
#qr-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:9999;align-items:center;justify-content:center;}
#qr-modal.on{display:flex;}
.qr-box{background:#fff;border-radius:20px;padding:28px 24px;text-align:center;max-width:320px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,0.2);}
.qr-heading{font-size:16px;font-weight:700;color:#333;margin-bottom:4px;}
.qr-url{font-size:11px;color:#999;margin-bottom:14px;word-break:break-all;}
#qr-canvas{border-radius:8px;margin-bottom:14px;}
.qr-dl{padding:10px 22px;background:#4CAF50;color:#fff;border:none;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;margin:4px;}
.qr-cl{padding:10px 22px;background:#eee;color:#333;border:none;border-radius:50px;font-size:14px;cursor:pointer;margin:4px;}

/* Spinner */
#link-spinner{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:9998;align-items:center;justify-content:center;}
#link-spinner.on{display:flex;}
.sp-ring{width:54px;height:54px;border:6px solid rgba(255,255,255,0.2);border-top:6px solid #c87941;border-radius:50%;animation:sp-spin 0.75s linear infinite;}
@keyframes sp-spin{to{transform:rotate(360deg);}}

</style>
</head>
<body>

<h2>Memory-byggare</h2>

<div class="section">
  <input type="text" id="title" placeholder="Titel på memory-spelet" oninput="updateData()">
</div>

<div class="section" style="text-align:left;padding:14px 18px;">
  <b>🌐 Välj språk</b>
  <div style="margin-top:8px;display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
    <label style="font-size:14px;"><input type="checkbox" id="langSV" checked onchange="render()"> 🇸🇪 Svenska</label>
    <label style="font-size:14px;"><input type="checkbox" id="langAR" checked onchange="render()"> 🇸🇦 Arabiska</label>
    <label style="font-size:14px;"><input type="checkbox" id="langSO" onchange="render()"> 🇸🇴 Somaliska</label>
    <label style="font-size:14px;"><input type="checkbox" id="langEN" onchange="render()"> 🇬🇧 Engelska</label>
  </div>
  <div style="margin-top:10px;font-size:13px;color:#777;">
    💡 Varje ord får ett kort per språk – samma bild, texten läses upp när kortet vänds.
  </div>
</div>

<div id="cards"></div>
<button onclick="addCard()">➕ Lägg till ord</button>

<div class="tool-row">
  <div class="tool-btn" onclick="exportJSON()">
    <div class="icon">⬇️</div>
    <div class="label">Ladda ner JSON</div>
  </div>
  <div class="tool-btn" onclick="importJSON()">
    <div class="icon">⬆️</div>
    <div class="label">Ladda upp JSON</div>
  </div>
  <div class="tool-btn" onclick="createLink()">
    <div class="icon">🔗</div>
    <div class="label">Skapa länk</div>
  </div>
</div>

<br>
<button onclick="generatePreview()">▶️ Generera preview</button>

<div id="preview" class="section">
  <h3 id="previewTitle"></h3>
  <p style="font-size:13px;color:#777;">Kortens framsidor (visas när man vänder)</p>
  <div class="preview-grid" id="previewGrid"></div>
</div>

<script>
let memoryData={title:"",cards:[]};

const LANGS=[
  {id:"langSV",code:"sv-SE",label:"Svenska",    flag:"🇸🇪",dir:"ltr"},
  {id:"langAR",code:"ar-SA",label:"العربية",    flag:"🇸🇦",dir:"rtl"},
  {id:"langSO",code:"so-SO",label:"Af Soomaali",flag:"🇸🇴",dir:"ltr"},
  {id:"langEN",code:"en-US",label:"English",    flag:"🇬🇧",dir:"ltr"},
];

function activeLangs(){return LANGS.filter(l=>document.getElementById(l.id)?.checked);}

function clickFeedback(){
  try{const a=new Audio("data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YQAAAAA=");a.volume=0.2;a.play();}catch(e){}
}
document.addEventListener("click",e=>{
  if(e.target.tagName==="BUTTON"||e.target.closest(".tool-btn")) clickFeedback();
});

function speak(text,langCode){
  if(!text){alert("Ingen text.");return;}
  const synth=window.speechSynthesis;
  synth.cancel();
  function doSpeak(){
    const utt=new SpeechSynthesisUtterance(text);
    utt.lang=langCode; utt.rate=0.85;
    const voices=synth.getVoices();
    const base=langCode.split("-")[0];
    // Try exact match first, then prefix match
    const m=voices.find(v=>v.lang===langCode)||voices.find(v=>v.lang.startsWith(base));
    if(m) utt.voice=m;
    synth.speak(utt);
  }
  // If voices not loaded yet, wait for them
  const voices=synth.getVoices();
  if(voices.length>0){ doSpeak(); }
  else {
    synth.onvoiceschanged=function(){ synth.onvoiceschanged=null; doSpeak(); };
    // Fallback timeout in case onvoiceschanged never fires
    setTimeout(function(){ if(!synth.speaking) doSpeak(); },500);
  }
}

function render(){
  const container=document.getElementById("cards");
  container.innerHTML="";
  const langs=activeLangs();
  memoryData.cards.forEach((card,i)=>{
    const div=document.createElement("div");
    div.className="section card-editor";
    const langsHtml=langs.map(lang=>{
      const val=card.texts?.[lang.code]||"";
      return `<div class="lang-col">
        <h4>${lang.flag} ${lang.label}</h4>
        <div class="tts-row">
          <input type="text" value="${escHtml(val)}" placeholder="Skriv ordet..." dir="${lang.dir}"
            oninput="memoryData.cards[${i}].texts['${lang.code}']=this.value">
          <button class="play-tts" onclick="speak(memoryData.cards[${i}].texts['${lang.code}'],'${lang.code}')">🔊</button>
        </div>
      </div>`;
    }).join("");
    div.innerHTML=`
      <b>Ord ${i+1}</b><br>
      <div style="margin:6px 0;">📷 <input type="file" accept="image/*" onchange="loadImage(event,${i})" style="width:auto;margin:6px 0;"></div>
      ${card.img?`<img class="thumb" src="${card.img}">`:""}
      <div class="lang-row">${langsHtml}</div>
      <div style="margin-top:6px;">
        <button class="smallBtn" onclick="moveUp(${i})">🔼</button>
        <button class="smallBtn" onclick="moveDown(${i})">🔽</button>
        <button class="smallBtn" onclick="removeCard(${i})">🗑</button>
      </div>`;
    container.appendChild(div);
  });
}

function addCard(){memoryData.cards.push({img:"",texts:{}});render();}
function removeCard(i){memoryData.cards.splice(i,1);render();}
function moveUp(i){if(i===0)return;[memoryData.cards[i],memoryData.cards[i-1]]=[memoryData.cards[i-1],memoryData.cards[i]];render();}
function moveDown(i){if(i===memoryData.cards.length-1)return;[memoryData.cards[i],memoryData.cards[i+1]]=[memoryData.cards[i+1],memoryData.cards[i]];render();}

function loadImage(e,i){
  const file=e.target.files[0];if(!file)return;
  const img=new Image(),reader=new FileReader();
  reader.onload=function(ev){
    img.onload=function(){
      const canvas=document.createElement("canvas"),ctx=canvas.getContext("2d");
      const maxW=400;let w=img.width,h=img.height;
      if(w>maxW){h=h*(maxW/w);w=maxW;}
      canvas.width=w;canvas.height=h;ctx.drawImage(img,0,0,w,h);
      canvas.toBlob(function(blob){
        const r2=new FileReader();
        r2.onload=function(){memoryData.cards[i].img=r2.result;render();};
        r2.readAsDataURL(blob);
      },"image/jpeg",0.7);
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

function updateData(){memoryData.title=document.getElementById("title").value;}
function escHtml(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function generatePreview(){
  updateData();
  const langs=activeLangs();
  document.getElementById("previewTitle").textContent=memoryData.title||"Memory-spel";
  const grid=document.getElementById("previewGrid");
  grid.innerHTML="";
  memoryData.cards.forEach(card=>{
    langs.forEach(lang=>{
      const div=document.createElement("div");
      div.className="preview-card";
      if(card.img){div.innerHTML=`<img src="${card.img}">`;}
      else{div.textContent=(card.texts?.[lang.code]||"–")+" "+lang.flag;}
      grid.appendChild(div);
    });
  });
  document.getElementById("preview").style.display="block";
}

async function uploadFile(path,content,repo){
  const res=await fetch("https://upload-api-kappa.vercel.app/api/upload",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({path,content,repo})
  });
  const data=await res.json();
  if(!data.ok) throw new Error(data.error||"Upload failed");
  return data;
}

async function createLink(){
  updateData();
  const langs=activeLangs();
  if(langs.length<2){alert("Välj minst 2 språk.");return;}
  const hasContent=memoryData.cards.some(c=>c.img||langs.some(l=>c.texts?.[l.code]));
  if(!hasContent){alert("Lägg till minst ett ord.");return;}

  const id=Date.now(),basePath="memory-"+id,repo="Sukrutaraj/checklist-pages";
  const base="https://sukrutaraj.github.io/checklist-pages/";

    document.getElementById('link-spinner').classList.add('on');

  try{
    const cardDefs=[];
    for(let i=0;i<memoryData.cards.length;i++){
      const card=memoryData.cards[i];
      if(!card.img&&!langs.some(l=>card.texts?.[l.code])) continue;
      let imgUrl="";
      if(card.img){
        const imgName=basePath+"-img-"+i+".jpg";
        await uploadFile(imgName,card.img.split(",")[1],repo);
        await new Promise(r=>setTimeout(r,300));
        imgUrl=base+imgName;
      }
      langs.forEach(lang=>{
        cardDefs.push({
          pairId:i,imgUrl:imgUrl,
          text:card.texts?.[lang.code]||"",
          langCode:lang.code,langLabel:lang.label,langFlag:lang.flag
        });
      });
    }

    const safeTitle=(memoryData.title||"Memory").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    const pairCount=[...new Set(cardDefs.map(c=>c.pairId))].length;
    const maxOpts=[2,4,6,8].filter(n=>n<=pairCount);
    if(maxOpts.length===0) maxOpts.push(pairCount);
    const optionsHtml=maxOpts.map(n=>`<option value="${n}">${n} ord (${n*langs.length} kort)</option>`).join("");

    // ================================================================
    // SPELMOTORN – identisk struktur med originalet
    // Enda skillnad: speakText() istället för new Audio()
    // ================================================================
    const sharedHtml=[
"<!DOCTYPE html>",
"<html lang='sv'>",
"<head>",
"<meta charset='UTF-8'>",
"<meta name='viewport' content='width=device-width, initial-scale=1.0'>",
"<title>"+safeTitle+"</title>",
"<style>",
"html,body{margin:0;padding:0;font-family:system-ui,sans-serif;transition:background-color 0.3s;}",
"body.setup{background:#f2efe9;}",
"body.blueTurn{background:#7fb3c8;}",
"body.orangeTurn{background:#e6b566;}",
"#controls{padding:10px;text-align:center;font-size:22px;font-weight:bold;}",
"#controls button{font-size:26px;margin-left:10px;}",
"#board{position:relative;width:100vw;height:calc(100vh - 120px);overflow:hidden;touch-action:none;}",
".card{position:absolute;width:130px;height:150px;background:#bbb;border-radius:12px;border:2px solid #333;user-select:none;touch-action:none;overflow:hidden;}",
".card-face{display:none;flex-direction:column;align-items:center;width:100%;height:100%;}",
".card.faceup .card-face{display:flex;}",
".card.faceup{background:#fff;}",
".card-face img{width:100%;height:100px;object-fit:cover;border-radius:8px 8px 0 0;flex-shrink:0;}",
".card-face .card-lbl{font-size:13px;font-weight:bold;text-align:center;padding:4px 4px 2px;word-break:break-word;line-height:1.2;width:100%;box-sizing:border-box;}",
".card.blue{border-color:#2f6f86;border-width:6px;}",
".card.orange{border-color:#b8742a;border-width:6px;}",
"#setup{text-align:center;padding:20px;}",
".hidden{display:none;}",
"</style>",
"</head>",
"<body class='setup'>",
"<div id='setup'>",
"  <h2>"+safeTitle+"</h2>",
"  <p>Hur många ord?</p>",
"  <select id='imageCount'>"+optionsHtml+"</select>",
"  <br><br>",
"  <p>Hur vill du vända kort?</p>",
"  <select id='flipMode'>",
"    <option value='hold'>Håll fingret på kort</option>",
"    <option value='button'>Tryck på knapp</option>",
"  </select>",
"  <br><br>",
"  <button onclick='startGame()'>▶ Spela</button>",
"</div>",
"<div id='controls' class='hidden'>",
"  Tur: <span id='turnText'>Blå</span>",
"  <button onclick='playAgain()'>🔁</button>",
"  <button onclick='goHome()'>🏠</button>",
"</div>",
"<div id='board'></div>",
"<script>",
"var ALL_CARDS="+JSON.stringify(cardDefs)+";",
"document.addEventListener('contextmenu',function(e){e.preventDefault();});",
"var board=document.getElementById('board');",
"var turnText=document.getElementById('turnText');",
"var setupDiv=document.getElementById('setup');",
"var controls=document.getElementById('controls');",
"var currentTeam='blue';",
"var openCards=[];",
"var holdTimer=null;",
"var lastCount=0;",
"var flipMode='hold';",
"var MOVE_THRESHOLD=25;",
"",
"function speakText(text,langCode){",
"  if(!text) return;",
"  var synth=window.speechSynthesis; synth.cancel();",
"  function doSpeak(){",
"    var utt=new SpeechSynthesisUtterance(text);",
"    utt.lang=langCode; utt.rate=0.85;",
"    var voices=synth.getVoices();",
"    var base=langCode.split('-')[0];",
"    var m=voices.find(function(v){return v.lang===langCode;})||voices.find(function(v){return v.lang.startsWith(base);});",
"    if(m) utt.voice=m;",
"    synth.speak(utt);",
"  }",
"  if(synth.getVoices().length>0){ doSpeak(); }",
"  else{",
"    synth.onvoiceschanged=function(){synth.onvoiceschanged=null;doSpeak();};",
"    setTimeout(function(){if(!synth.speaking)doSpeak();},500);",
"  }",
"}",
"",
"function startGame(){",
"  var count=parseInt(document.getElementById('imageCount').value);",
"  flipMode=document.getElementById('flipMode').value;",
"  lastCount=count;",
"  board.innerHTML=''; openCards=[]; currentTeam='blue';",
"  setupDiv.classList.add('hidden');",
"  controls.classList.remove('hidden');",
"  document.body.className='blueTurn';",
"  turnText.textContent='Blå';",
"  var pairs={};",
"  ALL_CARDS.forEach(function(c){if(!pairs[c.pairId]) pairs[c.pairId]=[];pairs[c.pairId].push(c);});",
"  var pairIds=Object.keys(pairs);",
"  shuffle(pairIds);",
"  pairIds=pairIds.slice(0,count);",
"  var chosen=[];",
"  pairIds.forEach(function(pid){pairs[pid].forEach(function(c){chosen.push(c);});});",
"  shuffle(chosen);",
"  createCards(chosen);",
"}",
"",
"function playAgain(){",
"  if(lastCount===0) return;",
"  document.getElementById('imageCount').value=lastCount;",
"  startGame();",
"}",
"",
"function goHome(){",
"  board.innerHTML=''; openCards=[]; lastCount=0;",
"  document.body.className='setup';",
"  setupDiv.classList.remove('hidden');",
"  controls.classList.add('hidden');",
"}",
"",
"function createCards(cards){",
"  cards.forEach(function(cardData){",
"    var card=document.createElement('div');",
"    card.className='card';",
"    card.dataset.id=cardData.pairId;",
"    card.dataset.text=cardData.text;",
"    card.dataset.lang=cardData.langCode;",
"    card.dataset.paired='false';",
"    var face=document.createElement('div');",
"    face.className='card-face';",
"    if(cardData.imgUrl){",
"      var img=document.createElement('img');",
"      img.src=cardData.imgUrl;",
"      face.appendChild(img);",
"    }",
"    if(cardData.text){",
"      var lbl=document.createElement('div');",
"      lbl.className='card-lbl';",
"      lbl.textContent=cardData.text;",
"      if(!cardData.imgUrl) lbl.style.justifyContent='center';",
"      if(!cardData.imgUrl) lbl.style.display='flex';",
"      if(!cardData.imgUrl) lbl.style.alignItems='center';",
"      if(!cardData.imgUrl) lbl.style.height='100%';",
"      if(!cardData.imgUrl) lbl.style.fontSize='16px';",
"      face.appendChild(lbl);",
"    }",
"    card.appendChild(face);",
"    card.style.left=Math.random()*(board.clientWidth-150)+'px';",
"    card.style.top =Math.random()*(board.clientHeight-160)+'px';",
"    if(flipMode==='hold'){makeHold(card);}else{makeButton(card);}",
"    makeDrag(card);",
"    board.appendChild(card);",
"  });",
"}",
"",
"function makeHold(card){",
"  var startX,startY,moved=false;",
"  card.addEventListener('pointerdown',function(e){",
"    if(card.dataset.paired==='true') return;",
"    startX=e.clientX; startY=e.clientY; moved=false;",
"    holdTimer=setTimeout(function(){",
"      if(!moved){ flipOpen(card); }",
"    },700);",
"  });",
"  card.addEventListener('pointermove',function(e){",
"    if(Math.hypot(e.clientX-startX,e.clientY-startY)>MOVE_THRESHOLD){moved=true;clearTimeout(holdTimer);}",
"  });",
"  card.addEventListener('pointerup',function(){clearTimeout(holdTimer);});",
"}",
"",
"function makeButton(card){",
"  var btn=document.createElement('div');",
"  btn.textContent='🔍';",
"  btn.style.position='absolute';btn.style.bottom='5px';btn.style.right='5px';",
"  btn.style.background='#fff';btn.style.border='2px solid #333';btn.style.borderRadius='8px';",
"  btn.style.padding='4px 8px';btn.style.fontSize='18px';btn.style.cursor='pointer';",
"  card.appendChild(btn);",
"  btn.addEventListener('pointerdown',function(e){",
"    e.stopPropagation();",
"    if(card.dataset.paired==='true') return;",
"    flipOpen(card);",
"  });",
"}",
"",
"function flipOpen(card){",
"  if(openCards.indexOf(card)>-1) return;",
"  if(openCards.length>=2) return;",
"  card.classList.add('faceup');",
"  speakText(card.dataset.text,card.dataset.lang);",
"  openCards.push(card);",
"  if(openCards.length===2) checkPair();",
"}",
"",
"function checkPair(){",
"  var a=openCards[0],b=openCards[1];",
"  if(a.dataset.id===b.dataset.id){",
"    a.dataset.paired='true'; b.dataset.paired='true';",
"    a.classList.add(currentTeam); b.classList.add(currentTeam);",
"  } else {",
"    setTimeout(function(){a.classList.remove('faceup');b.classList.remove('faceup');},1500);",
"    switchTurn();",
"  }",
"  openCards=[];",
"}",
"",
"function switchTurn(){",
"  currentTeam=currentTeam==='blue'?'orange':'blue';",
"  document.body.className=currentTeam+'Turn';",
"  turnText.textContent=currentTeam==='blue'?'Blå':'Orange';",
"}",
"",
"function makeDrag(el){",
"  var ox,oy,activePointer=null;",
"  el.addEventListener('pointerdown',function(e){",
"    ox=e.clientX-el.offsetLeft; oy=e.clientY-el.offsetTop;",
"    activePointer=e.pointerId;",
"    el.setPointerCapture(activePointer);",
"  });",
"  el.addEventListener('pointermove',function(e){",
"    if(e.pointerId!==activePointer) return;",
"    el.style.left=(e.clientX-ox)+'px';",
"    el.style.top =(e.clientY-oy)+'px';",
"  });",
"  el.addEventListener('pointerup',function(){release();});",
"  el.addEventListener('pointercancel',function(){release();});",
"  function release(){",
"    if(activePointer!==null){el.releasePointerCapture(activePointer);activePointer=null;}",
"  }",
"}",
"",
"function shuffle(a){",
"  for(var i=a.length-1;i>0;i--){",
"    var j=Math.floor(Math.random()*(i+1));",
"    var t=a[i];a[i]=a[j];a[j]=t;",
"  }",
"}",
"<\/script>",
"</body>",
"</html>"
].join("\n");

    const htmlName=basePath+".html";
    await uploadFile(htmlName,btoa(unescape(encodeURIComponent(sharedHtml))),repo);

    const url=base+htmlName;
    let copied=false;
    try{await navigator.clipboard.writeText(url);copied=true;}catch(e){}

    document.getElementById('link-spinner').classList.remove('on');
    document.getElementById('qr-copied').textContent = copied ? '✔ Länken är kopierad till urklipp' : '⚠️ Kopiera länken manuellt';
    document.getElementById('qr-copied').style.color = copied ? '#4CAF50' : '#e67e22';
    showQR(url, document.getElementById('title') ? document.getElementById('title').value || 'Memory' : 'Memory');
  }catch(err){alert("Fel: "+err.message);}
}

function importJSON(){

  input.onchange=e=>{
    const r=new FileReader();
    r.onload=()=>{
      try{
        const raw=JSON.parse(r.result);
        memoryData={title:raw.title||"",cards:(raw.cards||[]).map(c=>({img:c.img||"",texts:c.texts||{}}))};
        document.getElementById("title").value=memoryData.title;
        render();alert("Memory laddad!");
      }catch{alert("Ogiltig JSON-fil");}
    };
    r.readAsText(e.target.files[0]);
  };
  input.click();
}

function download(data,name,type="text/plain"){
  const blob=new Blob([data],{type});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=name;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

/* ===== QR KOD ===== */
function showQR(url, title) {
  document.getElementById('qr-h').textContent = title || 'QR-kod';
  document.getElementById('qr-u').textContent = url;
  document.getElementById('qr-modal').classList.add('on');
  var canvas = document.getElementById('qr-canvas');
  var ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,200,200);
  function doQR() {
    var div = document.createElement('div');
    new QRCode(div, {text:url,width:200,height:200,colorDark:'#000',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M});
    setTimeout(function(){
      var el = div.querySelector('canvas') || div.querySelector('img');
      if(!el) return;
      if(el.tagName==='CANVAS'){ ctx.drawImage(el,0,0,200,200); }
      else { var i=new Image(); i.onload=function(){ctx.drawImage(i,0,0,200,200);}; i.src=el.src; }
    }, 400);
  }
  if(typeof QRCode==='undefined'){
    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
    s.onload=doQR; document.head.appendChild(s);
  } else { doQR(); }
}

function dlQRpdf() {
  var title = document.getElementById('qr-h').textContent;
  var url   = document.getElementById('qr-u').textContent;
  var canvas = document.getElementById('qr-canvas');
  function build(Lib) {
    var doc = new Lib({orientation:'portrait',unit:'mm',format:'a4'});
    var W = doc.internal.pageSize.getWidth();
    doc.setFontSize(22); doc.setFont('helvetica','bold');
    doc.text(title, W/2, 30, {align:'center'});
    var sz=100, x=(W-sz)/2;
    doc.addImage(canvas.toDataURL('image/png'),'PNG',x,45,sz,sz);
    doc.setFontSize(10); doc.setFont('helvetica','normal'); doc.setTextColor(100,100,100);
    doc.text(url, W/2, 158, {align:'center', maxWidth:W-30});
    doc.save((title.replace(/[^a-zA-Z0-9 ]/g,'_')||'qrkod')+'_QR.pdf');
  }
  function load(cb){
    if(typeof jsPDF!=='undefined'){cb(jsPDF);return;}
    if(window.jspdf){cb(window.jspdf.jsPDF);return;}
    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    s.onload=function(){cb(window.jspdf?window.jspdf.jsPDF:jsPDF);};
    document.head.appendChild(s);
  }
  load(build);
}
